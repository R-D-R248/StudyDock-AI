<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyDock AI - Minimalist Notebook</title>
    <!-- Configured Tailwind properly to support class-based dark mode -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');
        console.log(
          "Do you want to contribute to the code? %cClick here: https://github.com/R-D-R248/StudyDock-AI", 
          "color: #0066cc; text-decoration: underline; font-weight: bold;"
        );
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #warning{
            display: none;
            position: fixed; /* Keeps it locked to the screen, even when scrolling */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999; /* A high number ensures it sits on top of everything else */
        }
        #app-download{
            display:none;
            position: fixed; /* Keeps it locked to the screen, even when scrolling */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
        }
        /* Show the object only in portrait mode */
        @media (orientation: portrait) {
            #warning {
                display: block; /* or 'flex', 'grid', etc. */
            }
        }
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
          // Device supports APKs (Android phones, tablets, ChromeOS, FireOS)
          document.getElementById("app-download").style.display = "block";
        }
        /* Fixed canvas wrapper for stable scrolling & centering */
        .canvas-wrapper { 
            flex: 1;
            min-height: 0;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 1.5rem;
            position: relative;
        }
        
        canvas { 
            transform-origin: top center;
            margin: 0 auto; 
            display: block;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .title {
            font-family: "Oswald", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
        }
        #pdf-buttons{
            display: flex;
            justify-content: space-between;
        }

        /* Markdown overrides for cleaner spacing */
        .prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose *:first-child { margin-top: 0; }
        .prose *:last-child { margin-bottom: 0; }
    </style>
</head>
<body class="h-full overflow-hidden flex flex-col bg-gray-50 dark:bg-zinc-950 text-gray-900 dark:text-zinc-100 transition-colors duration-300">
    <!--Warning-->
    <div id="warning" class="warning" style="background-color: #1D4ED8;">
        <p style="text-align:center;transform: translateY(200px);">Rotate your phone to landscape, or maximize the browser window on laptop/desktop.</p>
    </div>
    <div id="app-download" style="background-color: #1D4ED8;">
        <p style="text-align:center;transform: translateY(200px);">Click </p><a link="https://github.com/R-D-R248/StudyDock-AI/releases/download/v1/StudyDock_AI.apk">here</a><p>to download app.</p>
    </div>
    <!-- Top Bar 1 -->
    <header class="h-16 shrink-0 flex items-center justify-between px-6 z-20 border-b border-blue-400 dark:border-blue-800 text-white bg-[#4d97ff] dark:bg-blue-700 transition-colors duration-300">
        <h1 class="font-bold text-lg tracking-wider title">StudyDock AI</h1>
        <a href="https://github.com/R-D-R248/StudyDock-AI/blob/main/README.md" target="_blank" class="underline hover:text-blue-100">About</a>
    </header>

    <!-- Top Bar 2 (Controls) -->
    <header class="h-14 shrink-0 flex items-center justify-between px-6 z-20 border-b border-gray-300 dark:border-zinc-800 text-white bg-gray-500 dark:bg-zinc-900 transition-colors duration-300">
        <div class="flex items-center gap-4 text-xs font-semibold uppercase tracking-wider w-full">
            <div class="flex items-center gap-2">Name: 
                <input type="text" id="name-input" class="w-20 p-1.5 rounded bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:bg-white/30 transition-colors" placeholder="Name">
            </div>
            <div class="flex items-center gap-2">Age: 
                <input type="number" id="age-input" min=3 max=120 class="w-16 p-1.5 rounded bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:bg-white/30 transition-colors" placeholder="13">
            </div>
            <div class="flex items-center gap-2 ml-auto">
                API Key: 
                <input type="password" id="api-key" class="w-40 p-1.5 rounded bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:bg-white/30 transition-colors" placeholder="sk-...">
                <div id="api-status-dot" class="w-3 h-3 rounded-full bg-red-400 shadow-[0_0_8px_rgba(0,0,0,0.2)]"></div>
            </div>
            <button id="theme-toggle" class="p-1.5 rounded hover:bg-white/10 transition-colors ml-2 text-base">☀️</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Sidebar: Documents -->
        <section class="w-64 border-r border-gray-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-4 flex flex-col transition-colors duration-300">
            <input type="file" id="pdf-upload" accept="application/pdf" class="hidden" multiple>
            <label for="pdf-upload" class="w-full h-32 border-2 border-dashed border-gray-300 dark:border-zinc-600 rounded-lg flex flex-col items-center justify-center cursor-pointer bg-gray-50 dark:bg-zinc-800/50 hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors">
                <span class="text-sm font-semibold opacity-80 dark:text-zinc-300">Upload PDF(s)</span>
            </label>
            <div id="document-list" class="mt-4 overflow-y-auto space-y-2 flex-1"></div>
        </section>

        <!-- Center: PDF Viewer -->
        <section class="flex-1 min-w-0 min-h-0 bg-gray-100 dark:bg-[#121212] flex flex-col overflow-hidden">
            <div id="pdf-buttons"class="h-12 shrink-0 flex items-center px-4 bg-white dark:bg-zinc-900 border-b border-gray-200 dark:border-zinc-800" >
                <button id="pdf-zoom-out" class="p-1.5 px-3 bg-gray-200 dark:bg-zinc-800 dark:text-zinc-200 dark:hover:bg-zinc-700 rounded text-sm font-bold transition-colors" title="Zoom Out">- </button>
                <button id="pdf-prev" class="p-1.5 px-3 bg-gray-200 dark:bg-zinc-800 dark:text-zinc-200 dark:hover:bg-zinc-700 rounded text-sm font-bold transition-colors">Prev</button>
                <span id="page_info" class="text-xs font-mono dark:text-zinc-300 min-w-[80px] text-center" style="margin-left:-5px; margin-right:-5px;">Page 0</span><!--This one is too far apart--->
                <button id="pdf-next" class="p-1.5 px-3 bg-gray-200 dark:bg-zinc-800 dark:text-zinc-200 dark:hover:bg-zinc-700 rounded text-sm font-bold transition-colors" >Next</button>
                <button id="pdf-zoom-in" class="p-1.5 px-3 bg-gray-200 dark:bg-zinc-800 dark:text-zinc-200 dark:hover:bg-zinc-700 rounded text-sm font-bold transition-colors" title="Zoom In">+ </button>
                <div class="h-6 w-px bg-gray-300 dark:bg-zinc-700 mx-2"></div>
                
            </div>
            <div class="canvas-wrapper">
                <canvas id="pdf-canvas" class="dark:opacity-90" style="width: 292.735px; height: 373.975px;"></canvas>
            </div>
        </section>

        <!-- Right Sidebar: AI Chat -->
        <section class="w-96 border-l border-gray-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 flex flex-col transition-colors duration-300">
            <div class="flex border-b border-gray-200 dark:border-zinc-800">
                <button id="tab-tutor" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-blue-500 text-blue-500 dark:text-blue-400 transition-colors">Tutor</button>
                <button id="tab-quiz" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-gray-400 dark:text-zinc-500 hover:text-gray-600 dark:hover:text-zinc-300 transition-colors">Quiz</button>
                
            </div>
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div class="p-4 border-t border-gray-200 dark:border-zinc-800 flex gap-2 bg-gray-50 dark:bg-zinc-900 transition-colors duration-300">
                <input id="chat-input" type="text" class="flex-1 p-2.5 border border-gray-300 dark:border-zinc-700 rounded-lg text-sm bg-white dark:bg-zinc-800 text-gray-900 dark:text-zinc-100 placeholder-gray-400 dark:placeholder-zinc-500 focus:outline-none focus:border-blue-500 transition-colors" placeholder="Ask StudyDock AI...">
                <button id="send-btn" class="px-5 py-2.5 bg-blue-500 hover:bg-blue-600 font-semibold transition-colors text-white rounded-lg text-sm">Send</button>
            </div>
        </section>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let state = { 
            mode: 'tutor', 
            apiKey: '', 
            documents: [], // Array of { id, name, text, pdfDoc, pageNum, scale }
            activeDocId: null,
            generating: { tutor: false, quiz: false },
            chatHistories: {
                tutor: [{ role: 'ai', text: "Hi, I’m StudyDock AI Assistant. I can help explain your uploaded study material. What's your Doubt?" }],
                quiz: [{ role: 'ai', text: "Hi, I’m StudyDock Quiz AI. I can quiz you based on your uploaded study material. What do you want me to Quiz you on?" }]
            }
        };

        let apiTestTimeout = null;
        let pdfRenderTask = null; // Prevents render overlap crashes
        
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const statusDot = document.getElementById('api-status-dot');

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function renderChat() {
            chatContainer.innerHTML = '';
            state.chatHistories[state.mode].forEach(msg => {
                const div = document.createElement('div');
                div.className = `p-3.5 rounded-2xl text-sm break-words ${
                    msg.role === 'user' 
                    ? 'bg-blue-600 text-white ml-auto max-w-[85%] rounded-tr-sm' 
                    : 'bg-gray-100 text-gray-900 dark:bg-zinc-800 dark:text-zinc-100 max-w-[90%] rounded-tl-sm prose prose-sm dark:prose-invert'
                }`;
                div.innerHTML = msg.role === 'user' ? escapeHtml(msg.text) : marked.parse(msg.text);
                chatContainer.appendChild(div);
            });

            // Render a smooth typing indicator bubble if current mode is loading
            if (state.generating[state.mode]) {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'p-3.5 bg-gray-100 dark:bg-zinc-800 rounded-2xl rounded-tl-sm max-w-[90%] flex gap-1 items-center justify-center w-16';
                typingDiv.innerHTML = `
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-bounce" style="animation-delay: 0s"></span>
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-bounce" style="animation-delay: 0.2s"></span>
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-bounce" style="animation-delay: 0.4s"></span>
                `;
                chatContainer.appendChild(typingDiv);
            }

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Clean & robust message appender
        function addMessage(text, role, targetMode = state.mode) {
            state.chatHistories[targetMode].push({ role: role, text: text });
            if (targetMode === state.mode) {
                renderChat();
            }
        }

        // Fallback backward-compatible bridge function
        function appendMessage(text, isUser = false) {
            addMessage(text, isUser ? 'user' : 'ai');
        }

        renderChat();

        async function testApiKey() {
            if (state.apiKey.length < 10) {
                statusDot.className = "w-3 h-3 rounded-full bg-red-400 shadow-[0_0_8px_rgba(0,0,0,0.2)]";
                return;
            }
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "test" }] }] })
                });
                statusDot.className = response.ok ? "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]" : "w-3 h-3 rounded-full bg-red-400 shadow-[0_0_8px_rgba(0,0,0,0.2)]";
            } catch (e) {
                statusDot.className = "w-3 h-3 rounded-full bg-red-400 shadow-[0_0_8px_rgba(0,0,0,0.2)]";
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            // Lock the active mode context immediately upon sending
            const lockedMode = state.mode;

            if (!state.apiKey) return addMessage("Error: Please enter a valid Gemini API Key in the top bar.", "ai", lockedMode);
            
            addMessage(text, 'user', lockedMode);
            chatInput.value = '';

            // Toggle typing indicator for the locked mode
            state.generating[lockedMode] = true;
            if (lockedMode === state.mode) {
                renderChat();
            }

            const studentName = document.getElementById('name-input').value.trim();
            const studentAge = document.getElementById('age-input').value.trim();
            let userContext = "";
            if (studentName || studentAge) {
                userContext = `Student Profile: ${studentName ? 'Name: ' + studentName + '. ' : ''}${studentAge ? 'Age: ' + studentAge + '.' : ''}\n\n`;
            }
            
            let combinedText = state.documents.map(d => `[Document: ${d.name}]\n${d.text}`).join('\n\n');
            if (combinedText.length > 50000) combinedText = combinedText.substring(0, 50000) + '...'; 
            
            const contextStr = combinedText ? `Context:\n${combinedText}\n\n` : '';
            const prompt = lockedMode === 'tutor' 
                ? `${userContext}${contextStr}Query: ${text}. Please use tricks to make the student study easier.` 
                : `${userContext}${contextStr}Generate a quiz based on the context: ${text}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                
                state.generating[lockedMode] = false;
                
                if (reply) {
                    addMessage(reply, 'ai', lockedMode);
                } else if (data.error) {
                    addMessage(`AI Error: ${data.error.message || 'Unknown error'}`, 'ai', lockedMode);
                } else {
                    addMessage("Error: Received an unexpected response from the AI.", 'ai', lockedMode);
                }
            } catch (e) { 
                state.generating[lockedMode] = false;
                addMessage(`Network Error: Could not connect to Gemini. ${e.message}`, 'ai', lockedMode); 
            }
        }

        document.getElementById('send-btn').onclick = sendMessage;
        chatInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

        document.getElementById('pdf-upload').onchange = async (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type !== 'application/pdf') {
                    alert(`Skipped ${file.name} - Not a valid PDF.`);
                    continue;
                }
                
                const url = URL.createObjectURL(file);
                try {
                    const pdf = await pdfjsLib.getDocument(url).promise;
                    let fullText = "";
                    for(let j=1; j<=pdf.numPages; j++) {
                        const page = await pdf.getPage(j);
                        const content = await page.getTextContent();
                        fullText += content.items.map(item => item.str).join(" ");
                    }
                    
                    const docId = Date.now().toString() + Math.random().toString();
                    state.documents.push({
                        id: docId,
                        name: file.name,
                        pdfDoc: pdf,
                        text: fullText,
                        pageNum: 1,      // Local PDF State
                        scale: 1.25      // Local PDF State
                    });

                    if (!state.activeDocId) {
                        switchDocument(docId);
                    } else {
                        renderDocumentList();
                    }
                } catch (err) {
                    addMessage(`Error loading PDF: ${file.name}`, 'ai');
                }
            }
            e.target.value = ''; 
        };

        function renderDocumentList() {
            const listContainer = document.getElementById('document-list');
            listContainer.innerHTML = '';
            state.documents.forEach(doc => {
                const isActive = doc.id === state.activeDocId;
                const item = document.createElement('div');
                item.className = `p-2.5 rounded-lg text-sm cursor-pointer truncate border transition-colors ${
                    isActive 
                    ? 'bg-blue-100 border-blue-300 text-blue-900 dark:bg-blue-900/40 dark:border-blue-500 dark:text-blue-100 font-semibold' 
                    : 'bg-gray-100 border-transparent hover:bg-gray-200 text-gray-700 dark:bg-zinc-800 dark:hover:bg-zinc-700 dark:text-zinc-300'
                }`;
                item.textContent = `${doc.name} (${doc.pdfDoc.numPages} pages)`;
                item.onclick = () => switchDocument(doc.id);
                listContainer.appendChild(item);
            });
        }

        function switchDocument(id) {
            state.activeDocId = id;
            renderDocumentList();
            renderPage();
        }

        function switchMode(m) {
            state.mode = m;
            document.getElementById('tab-tutor').className = m === 'tutor' 
                ? 'flex-1 py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-blue-500 text-blue-500 dark:text-blue-400' 
                : 'flex-1 py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-gray-400 dark:text-zinc-500 hover:text-gray-600 dark:hover:text-zinc-300 transition-colors';
            
            document.getElementById('tab-quiz').className = m === 'quiz' 
                ? 'flex-1 py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-blue-500 text-blue-500 dark:text-blue-400' 
                : 'flex-1 py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-gray-400 dark:text-zinc-500 hover:text-gray-600 dark:hover:text-zinc-300 transition-colors';
            
            renderChat(); 
        }

        document.getElementById('tab-tutor').onclick = () => switchMode('tutor');
        document.getElementById('tab-quiz').onclick = () => switchMode('quiz');

        // Robust Zoom & Render Logic tied to isolated document state
        function renderPage() {
            if (!state.activeDocId) return;
            const activeDoc = state.documents.find(d => d.id === state.activeDocId);
            if (!activeDoc || !activeDoc.pdfDoc) return;
            
            if (pdfRenderTask !== null) {
                pdfRenderTask.cancel(); // Cancel ongoing render to avoid overlaps when spamming zoom
            }

            activeDoc.pdfDoc.getPage(activeDoc.pageNum).then(page => {
                const viewport = page.getViewport({ scale: activeDoc.scale });
                
                const outputScale = window.devicePixelRatio || 1;

                canvas.width = viewport.width * outputScale;
                canvas.height = viewport.height * outputScale;

                canvas.style.width = viewport.width + "px";
                canvas.style.height = viewport.height + "px";

                ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);
                
                const renderContext = { canvasContext: ctx, viewport: viewport };
                pdfRenderTask = page.render(renderContext);
                
                pdfRenderTask.promise.then(() => {
                    pdfRenderTask = null;
                }).catch(err => {
                    if (err.name !== 'RenderingCancelledException') {
                        console.error('Render error:', err);
                    }
                });

                document.getElementById('page_info').textContent = `Page ${activeDoc.pageNum}`;
            });
        }

        // Action Handlers attached to active document states natively
        document.getElementById('pdf-zoom-in').onclick = () => { 
            const activeDoc = state.documents.find(d => d.id === state.activeDocId);
            if (activeDoc) {
                activeDoc.scale = Math.min(3.5, activeDoc.scale + 0.25); 
                renderPage(); 
            }
        };

        document.getElementById('pdf-zoom-out').onclick = () => { 
            const activeDoc = state.documents.find(d => d.id === state.activeDocId);
            if (activeDoc) {
                activeDoc.scale = Math.max(0.5, activeDoc.scale - 0.25); 
                renderPage(); 
            }
        };

        document.getElementById('pdf-prev').onclick = () => { 
            const activeDoc = state.documents.find(d => d.id === state.activeDocId);
            if (activeDoc && activeDoc.pageNum > 1) {
                activeDoc.pageNum--;
                renderPage();
            }
        };

        document.getElementById('pdf-next').onclick = () => { 
            const activeDoc = state.documents.find(d => d.id === state.activeDocId);
            if (activeDoc && activeDoc.pageNum < activeDoc.pdfDoc.numPages) {
                activeDoc.pageNum++;
                renderPage();
            }
        };

        document.getElementById('api-key').oninput = (e) => {
            state.apiKey = e.target.value;
            clearTimeout(apiTestTimeout);
            apiTestTimeout = setTimeout(testApiKey, 1000);
        };
        
        // Tailwind standard HTML Dark mode toggling
        const themeToggle = document.getElementById('theme-toggle');

        function updateThemeIcon() {
            themeToggle.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        }

        const input = document.getElementById("age-input");
        input.addEventListener("input", () => {
            let value = input.value.replace(/\D/g, ""); // remove non-numbers instantly
            input.value = value;
        });

        // final clamp on exit
        input.addEventListener("blur", () => {
            if (input.value === "") return;

            let value = parseInt(input.value, 10);

            if (isNaN(value)) {
                input.value = "";
                return;
            }

            if (value < 3) value = 3;
            if (value > 120) value = 120;

            input.value = value;
        });
        updateThemeIcon();

        themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            updateThemeIcon();
        };
        window.addEventListener("beforeunload", function (event) {
            event.preventDefault();
            event.returnValue = "";
        });
    </script>
</body>
</html>
